<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TweenCraft Ultimate Tamil Studio</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f19; color: #f3f4f6; display: flex; flex-direction: column; min-height: 100vh; padding: 6px; align-items: center; justify-content: center; }
        
        /* மெயின் பாக்ஸ் - மொபைலுக்கு கச்சிதமானது */
        .studio-box { width: 100%; max-width: 360px; background: #1f2937; border-radius: 12px; padding: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); border: 1px solid #374151; }
        header { text-align: center; font-size: 13px; font-weight: bold; color: #38bdf8; margin-bottom: 6px; text-transform: uppercase; }
        
        /* 🎬 சதுர வடிவ சினிமா திரை (1:1 Ratio) */
        .screen-container { 
            width: 100%; 
            height: 280px; 
            background: #fff;
            border-radius: 10px;
            position: relative; 
            overflow: hidden; 
            border: 2px solid #38bdf8;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* 🎮 கட்டுப்பாடுகள் - சிறிய எழுத்துருக்கள் (Small Text Sizes) */
        .controls { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .scroll-row { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
        .scroll-row::-webkit-scrollbar { display: none; }
        
        .section-title { font-size: 10px; color: #9ca3af; font-weight: bold; text-transform: uppercase; margin-bottom: 1px; }
        
        /* சிறிய பட்டன்கள் */
        .btn { background: #374151; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: 600; white-space: nowrap; }
        .btn.active { background: #38bdf8; color: #111827; }
        
        /* ஜூம் ஸ்லைடர்கள் */
        .slider-group { display: flex; align-items: center; gap: 6px; background: #111827; padding: 4px 6px; border-radius: 4px; }
        .slider-group label { font-size: 10px; width: 65px; color: #9ca3af; }
        .slider-group input { flex: 1; height: 4px; }

        /* வீடியோ எடிட்டர் டைம்லைன் */
        .editor-timeline { background: #111827; border-radius: 6px; padding: 6px; display: flex; flex-direction: column; gap: 4px; }
        .track { height: 18px; background: #0b0f19; border-radius: 3px; display: flex; align-items: center; padding: 0 6px; font-size: 9px; }
        .track-label { width: 65px; font-weight: bold; color: #38bdf8; }
        .track-bar { flex: 1; height: 6px; background: #111827; border-radius: 2px; position: relative; overflow: hidden; }
        .track-fill { height: 100%; width: 0%; background: #6366f1; transition: width 0.1s linear; }

        .text-row { display: flex; gap: 4px; align-items: center; margin-top: 2px; }
        .text-input { background: #111827; color: white; border: 1px solid #374151; padding: 8px; border-radius: 6px; flex: 1; font-size: 12px; outline: none; }
        .btn-play { background: #10b981; color: white; font-weight: bold; padding: 8px 12px; }
    </style>
</head>
<body>

<div class="studio-box">
    <header>AniCraft Premium Real Studio</header>
    
    <div class="screen-container">
        <canvas id="studioCanvas" width="340" height="280"></canvas>
    </div>
    
    <div class="controls">
        
        <div class="slider-group">
            <label>🔎 அளவு (Scale):</label>
            <input type="range" id="sizeSlider" min="0.6" max="1.4" step="0.05" value="1" oninput="drawAll()">
        </div>
        <div class="slider-group">
            <label>↔️ இடமாற்றம் (X):</label>
            <input type="range" id="posSlider" min="-80" max="80" step="5" value="0" oninput="drawAll()">
        </div>

        <div>
            <div class="section-title">1. மனித கேரக்டர்கள் மாற்று (Select Character)</div>
            <div class="scroll-row">
                <button id="char1" class="btn active" onclick="changeCharacter('man1')">ஆண் 1 (ரமேஷ்)</button>
                <button id="char2" class="btn" onclick="changeCharacter('man2')">ஆண் 2 (தாடி மாடல்)</button>
                <button id="char3" class="btn" onclick="changeCharacter('woman1')">பெண் 1 (கவிதா)</button>
                <button id="char4" class="btn" onclick="changeCharacter('woman2')">பெண் 2 (மாடர்ன்)</button>
            </div>
        </div>

        <div>
            <div class="section-title">2. சினிமா பின்னணி மாற்று (Backgrounds)</div>
            <div class="scroll-row">
                <button id="bg1" class="btn active" onclick="changeBg('village')">🌾 கிராமம்</button>
                <button id="bg2" class="btn" onclick="changeBg('road')">🛣️ ரோடு</button>
                <button id="bg3" class="btn" onclick="changeBg('office')">🏢 ஆபீஸ்</button>
                <button id="bg4" class="btn" onclick="changeBg('kitchen')">🍳 சமையலறை</button>
                <button id="bg5" class="btn" onclick="changeBg('bedroom')">🛏️ பெட்ரூம்</button>
            </div>
        </div>

        <div>
            <div class="section-title">3. முக பாவனை (Expressions)</div>
            <div class="scroll-row">
                <button class="btn active" onclick="changeExpression('happy')">😀 மகிழ்ச்சி</button>
                <button class="btn" onclick="changeExpression('angry')">😡 கோபம்</button>
                <button class="btn" onclick="changeExpression('surprise')">😲 ஆச்சரியம்</button>
                <button class="btn" onclick="changeExpression('sad')">😢 சோகம்</button>
            </div>
        </div>

        <div>
            <div class="section-title">4. உடல் அசைவுகள் (Actions)</div>
            <div class="scroll-row">
                <button class="btn" onclick="triggerAction('left')">👋 இடது கை அசை</button>
                <button class="btn" onclick="triggerAction('right')">👋 வலது கை அசை</button>
                <button class="btn" onclick="triggerAction('walk')">🚶 நடப்பது போல்</button>
            </div>
        </div>

        <div class="editor-timeline">
            <div class="track">
                <span class="track-label">🎬 Video Track</span>
                <div class="track-bar"><div id="tVideo" class="track-fill"></div></div>
            </div>
            <div class="track">
                <span class="track-label">🎙️ Audio Wave</span>
                <div class="track-bar"><div id="tAudio" class="track-fill" style="background:#f59e0b;"></div></div>
            </div>
        </div>
        
        <div class="text-row">
            <input type="text" id="speechText" class="text-input" value="வணக்கம்! இப்போ எல்லாமே சூப்பரா வேலை செய்யுதுண்ணே!">
            <button class="btn btn-play" onclick="speakCharacter()">▶ பேசு</button>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('studioCanvas');
    const ctx = canvas.getContext('2d');

    let currentBg = 'village';
    let currentCharacter = 'man1';
    let currentExpression = 'happy';
    
    let leftArmAngle = 0;
    let rightArmAngle = 0;
    let bodyXOffset = 0;
    
    let isTalking = false;
    let talkMouthOpen = false;
    let actionInterval, talkInterval, timelineInterval;
    let synth = window.speechSynthesis;

    // 🏡 1. அனைத்து பின்னணிகளையும் கேன்வாஸில் நேரடியாக வரைதல் (No Image Links)
    function drawBackground() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (currentBg === 'village') {
            ctx.fillStyle = '#bae6fd'; ctx.fillRect(0, 0, canvas.width, canvas.height); // வானம்
            ctx.fillStyle = '#22c55e'; ctx.fillRect(0, 160, canvas.width, 120); // புல்வெளி கிராமம்
            ctx.fillStyle = '#fef08a'; ctx.beginPath(); ctx.arc(60, 60, 25, 0, Math.PI*2); ctx.fill(); // சூரியன்
            ctx.fillStyle = '#15803d'; ctx.fillRect(240, 100, 40, 70); // மரங்கள்
        } else if (currentBg === 'road') {
            ctx.fillStyle = '#fed7aa'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#4b5563'; ctx.fillRect(0, 150, canvas.width, 130); // தார் ரோடு
            ctx.fillStyle = '#eab308'; ctx.fillRect(0, 210, canvas.width, 8); // ரோடு மஞ்சள் கோடு
        } else if (currentBg === 'office') {
            ctx.fillStyle = '#f3f4f6'; ctx.fillRect(0, 0, canvas.width, canvas.height); // ஆபீஸ் சுவர்
            ctx.fillStyle = '#cbd5e1'; ctx.fillRect(0, 180, canvas.width, 100); // தரை
            ctx.fillStyle = '#1e293b'; ctx.fillRect(40, 180, 120, 50); // ஆபீஸ் மேஜை (Table)
        } else if (currentBg === 'kitchen') {
            ctx.fillStyle = '#fee2e2'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#78350f'; ctx.fillRect(0, 190, canvas.width, 90); // சமையல் மேடை
            ctx.fillStyle = '#ef4444'; ctx.fillRect(40, 130, 50, 40); // கேஸ் ஸ்டவ் / அடுப்பு
        } else if (currentBg === 'bedroom') {
            ctx.fillStyle = '#fae8ff'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#db2777'; ctx.fillRect(20, 170, 160, 60); // கட்டில் (Bed)
        }
    }

    // 👥 2. முழு மனித கார்ட்டூன் கதாபாத்திரத்தை வரைதல் (Realistic Vector)
    function drawCharacter() {
        const scale = parseFloat(document.getElementById('sizeSlider').value);
        const userX = parseInt(document.getElementById('posSlider').value);
        
        ctx.save();
        ctx.translate(170 + userX + bodyXOffset, 220); // கேரக்டர் பொசிஷன்
        ctx.scale(scale, scale);

        // கால்கள் மற்றும் ஷூ
        ctx.fillStyle = '#111827';
        ctx.fillRect(-15, 0, 10, 40); ctx.fillRect(5, 0, 10, 40);
        ctx.fillStyle = '#000';
        ctx.fillRect(-18, 35, 14, 8); ctx.fillRect(4, 35, 14, 8);

        // பேண்ட் (Pants)
        ctx.fillStyle = (currentCharacter.includes('man')) ? '#2563eb' : '#9333ea';
        ctx.fillRect(-16, -30, 32, 35);

        // சட்டை / ஆடை டிசைன் (Clothes Design)
        if (currentCharacter === 'man1') ctx.fillStyle = '#ef4444'; // சிவப்பு சட்டை
        else if (currentCharacter === 'man2') ctx.fillStyle = '#10b981'; // பச்சை கோட்
        else if (currentCharacter === 'woman1') ctx.fillStyle = '#ec4899'; // பிங்க் சுடிதார்
        else ctx.fillStyle = '#f59e0b'; // மாடர்ன் மஞ்சள் ஆடை
        ctx.fillRect(-20, -85, 40, 55);

        // இடது கை
        ctx.save();
        ctx.translate(-20, -80); ctx.rotate(leftArmAngle);
        ctx.fillStyle = ctx.fillStyle; ctx.fillRect(-8, 0, 8, 35);
        ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(-4, 35, 5, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // வலது கை
        ctx.save();
        ctx.translate(20, -80); ctx.rotate(rightArmAngle);
        ctx.fillStyle = ctx.fillStyle; ctx.fillRect(0, 0, 8, 35);
        ctx.fillStyle = '#ffdbac'; ctx.beginPath(); ctx.arc(4, 35, 5, 0, Math.PI*2); ctx.fill();
        ctx.restore();

        // முகம் மற்றும் கழுத்து (Human Face & Neck)
        ctx.fillStyle = '#ffdbac';
        ctx.fillRect(-5, -95, 10, 12); // கழுத்து
        ctx.beginPath(); ctx.arc(0, -115, 24, 0, Math.PI*2); ctx.fill(); // முகம்

        // கண்கள்
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(-8, -120, 2.5, 0, Math.PI*2); ctx.arc(8, -120, 2.5, 0, Math.PI*2); ctx.fill();

        // புருவங்கள் மற்றும் முக பாவனைகள் (Expressions)
        ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5; ctx.beginPath();
        if (currentExpression === 'happy') {
            ctx.moveTo(-13, -126); ctx.lineTo(-4, -126); ctx.moveTo(4, -126); ctx.lineTo(13, -126);
        } else if (currentExpression === 'angry') {
            ctx.moveTo(-13, -123); ctx.lineTo(-4, -128); ctx.moveTo(4, -128); ctx.lineTo(13, -123);
        } else if (currentExpression === 'sad' || currentExpression === 'surprise') {
            ctx.moveTo(-13, -128); ctx.lineTo(-4, -125); ctx.moveTo(4, -125); ctx.lineTo(13, -128);
        }
        ctx.stroke();

        // 👄 வாய் அசைவு (Talking Mouth Sync)
        ctx.fillStyle = '#000';
        if (isTalking && talkMouthOpen) {
            ctx.beginPath(); ctx.arc(0, -102, 5, 0, Math.PI*2); ctx.fill(); // பேசும்போது வாய் திறக்கும்
        } else {
            ctx.beginPath();
            if (currentExpression === 'happy') ctx.arc(0, -106, 8, 0, Math.PI);
            else if (currentExpression === 'angry' || currentExpression === 'sad') ctx.arc(0, -98, 7, Math.PI, 0);
            else { ctx.arc(0, -102, 3, 0, Math.PI*2); } // Surprise
            ctx.stroke();
        }

        // 💇 முடி மற்றும் தாடி டிசைன் (Hair Style Changer)
        ctx.fillStyle = '#1f2937';
        if (currentCharacter === 'man1') {
            ctx.beginPath(); ctx.arc(0, -135, 25, Math.PI, 0); ctx.fill(); // ஸ்பைக் முடி
        } else if (currentCharacter === 'man2') {
            ctx.beginPath(); ctx.arc(0, -135, 25, Math.PI, 0); ctx.fill(); 
            ctx.fillStyle = '#374151'; ctx.fillRect(-15, -104, 30, 8); // தாடி கேரக்டர் (Beard)
        } else if (currentCharacter === 'woman1') {
            ctx.fillRect(-26, -135, 52, 15); ctx.fillRect(-26, -120, 6, 45); ctx.fillRect(20, -120, 6, 45); // நீள முடி
        } else if (currentCharacter === 'woman2') {
            ctx.beginPath(); ctx.arc(0, -136, 27, Math.PI, 0); ctx.fill(); // மாடர்ன் ஹேர் கட்
        }

        ctx.restore();
    }

    function drawAll() {
        drawBackground();
        drawCharacter();
    }

    // கண்ட்ரோல் பங்க்ஷன்கள்
    function changeBg(bg) { currentBg = bg; drawAll(); }
    function changeExpression(exp) { currentExpression = exp; drawAll(); }
    
    function changeCharacter(char) { 
        currentCharacter = char; 
        document.getElementById('speechText').value = (char.includes('woman')) ? "வணக்கம் தோழி, இப்போ ஆடை எடிட்டிங் சூப்பரா வேலை செய்யுது!" : "வணக்கம் நண்பா, இப்போ ஆடை எடிட்டிங் சூப்பரா வேலை செய்யுது!";
        drawAll(); 
    }

    // 🏃 சினிமா ஆக்ஷன்கள் (கை, கால் அசைவு லூப்)
    function triggerAction(act) {
        clearInterval(actionInterval);
        leftArmAngle = 0; rightArmAngle = 0; bodyXOffset = 0;

        if (act === 'left') {
            let up = true;
            actionInterval = setInterval(() => {
                leftArmAngle = up ? 1.5 : 0.5; up = !up; drawAll();
            }, 200);
        } else if (act === 'right') {
            let up = true;
            actionInterval = setInterval(() => {
                rightArmAngle = up ? -1.5 : -0.5; up = !up; drawAll();
            }, 200);
        } else if (act === 'walk') {
            let step = 0;
            actionInterval = setInterval(() => {
                bodyXOffset = Math.sin(step) * 20;
                leftArmAngle = Math.sin(step) * 0.5;
                rightArmAngle = -Math.sin(step) * 0.5;
                step += 0.5; drawAll();
            }, 100);
        }
        setTimeout(() => { clearInterval(actionInterval); leftArmAngle = 0; rightArmAngle = 0; bodyXOffset = 0; drawAll(); }, 2500);
    }

    // 🎙️ வீடியோ எடிட்டர் டைம்லைன் மற்றும் பேச்சு ஒத்திசைவு
    function speakCharacter() {
        synth.cancel();
        clearInterval(talkInterval); clearInterval(timelineInterval);
        
        const text = document.getElementById('speechText').value;
        if (!text.trim()) return;

        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'ta-IN';
        utterance.pitch = currentCharacter.includes('woman') ? 1.4 : 0.7;

        let progress = 0;
        utterance.onstart = () => {
            isTalking = true;
            talkInterval = setInterval(() => { talkMouthOpen = !talkMouthOpen; drawAll(); }, 120);
            
            timelineInterval = setInterval(() => {
                if (progress < 100) {
                    progress += 4;
                    document.getElementById('tVideo').style.width = progress + '%';
                    document.getElementById('tAudio').style.width = progress + '%';
                }
            }, 100);
        };

        utterance.onend = () => {
            isTalking = false; talkMouthOpen = false;
            clearInterval(talkInterval); clearInterval(timelineInterval);
            document.getElementById('tVideo').style.width = '0%';
            document.getElementById('tAudio').style.width = '0%';
            drawAll();
        };

        synth.speak(utterance);
    }

    // முதன்முதலில் திரையை லோடு செய்ய
    window.onload = () => { drawAll(); };
</script>

</body>
</html>
